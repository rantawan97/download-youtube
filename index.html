<!DOCTYPE html>
<html>
<head>
    <title>YouTube Downloader</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            width: 350px;
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        a {
            display: block;
            margin-top: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h2>🎥 YouTube Downloader (MP4)</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Masukkan link YouTube..." required>
        <br>
        <button type="submit">Download</button>
    </form>

    {% if file_name %}
        <h3>✅ Download Selesai</h3>
        <a href="/download/{{ file_name }}">Klik untuk download file</a>
    {% endif %}

</body>
</html>
